<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <title>Nahantara — My Pride</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo"><span>🌾</span> ନହନ୍ତରା</div>
        <div class="header-icons">
            <span>❤️</span>
            <span>💬</span>
        </div>
    </div>
    
    <div class="swipe-container" id="swipeContainer">
        <div class="swipe-track" id="swipeTrack">
            <!-- PAGE 1 - HOME -->
            <div class="page page-home">
                <div class="stories-row" id="storiesList"></div>
                <div id="feedContainer"></div>
            </div>
            
            <!-- PAGE 2 - ANNOUNCEMENTS -->
            <div class="page page-announce">
                <div class="announce-header"><h3>📢 Announcements</h3><p>From village admin</p></div>
                <div id="announcementsList"></div>
                <div id="adminPanel" style="display:none; margin:16px;">
                    <textarea id="announceText" rows="2" placeholder="Write announcement..."></textarea>
                    <button onclick="postAnnouncement()">➕ Post Announcement</button>
                </div>
            </div>
            
            <!-- PAGE 3 - CHAT -->
            <div class="page page-chat">
                <div class="chat-tabs">
                    <button id="dmTab" class="chat-tab active">💬 Direct Message</button>
                    <button id="groupTab" class="chat-tab">👥 Group Chat</button>
                </div>
                <div id="dmPanel" class="chat-panel">
                    <div class="chat-messages" id="dmMessages"></div>
                    <div class="chat-input-area">
                        <input id="dmInput" placeholder="Message...">
                        <button onclick="sendDM()">➤</button>
                    </div>
                </div>
                <div id="groupPanel" class="chat-panel" style="display:none;">
                    <div class="chat-messages" id="groupMessages"></div>
                    <div class="chat-input-area">
                        <input id="groupInput" placeholder="Group message...">
                        <button onclick="sendGroupMsg()">➤</button>
                    </div>
                </div>
            </div>
            
            <!-- PAGE 4 - PROFILE -->
            <div class="page page-profile">
                <div id="profileArea"></div>
            </div>
        </div>
    </div>
    
    <div class="bottom-nav">
        <div class="nav-item" data-page="0">
            <div class="nav-icon">🏠</div>
            <div class="nav-label">Home</div>
        </div>
        <div class="nav-item" data-page="1">
            <div class="nav-icon">📢</div>
            <div class="nav-label">News</div>
        </div>
        <div class="nav-item" data-page="2">
            <div class="nav-icon">💬</div>
            <div class="nav-label">Chat</div>
        </div>
        <div class="nav-item" data-page="3">
            <div class="nav-icon">👤</div>
            <div class="nav-label">Profile</div>
        </div>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script src="data.js"></script>
<script src="home.js"></script>
<script src="announce.js"></script>
<script src="chat.js"></script>
<script src="profile.js"></script>
<script src="app.js"></script>
</body>
</html>
