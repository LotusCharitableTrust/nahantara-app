<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <title>Nahantara — Premium Social Village</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #fafafa;
            --bg-tertiary: #f5f5f5;
            --text-primary: #262626;
            --text-secondary: #8e8e8e;
            --text-tertiary: #c7c7c7;
            --border-color: #dbdbdb;
            --accent-color: #0095f6;
            --accent-gradient: linear-gradient(135deg, #0095f6, #00d4ff);
            --like-color: #ed4956;
            --success-color: #4caf50;
            --card-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        [data-theme="dark"] {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --bg-tertiary: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #a8a8a8;
            --text-tertiary: #6e6e6e;
            --border-color: #2c2c2c;
            --card-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app {
            max-width: 450px;
            width: 100%;
            background: var(--bg-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Header */
        .header {
            background: var(--bg-primary);
            padding: 12px 16px;
            border-bottom: 0.5px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .logo span { font-size: 26px; margin-right: 4px; }
        .header-actions { display: flex; gap: 20px; align-items: center; }
        .header-icon {
            font-size: 24px;
            cursor: pointer;
            color: var(--text-primary);
            transition: transform 0.2s;
        }
        .header-icon:active { transform: scale(0.92); }
        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: var(--bg-secondary);
            font-size: 20px;
            transition: var(--transition);
        }
        .theme-toggle:active { transform: scale(0.92); }

        /* Swipe Container */
        .swipe-container { flex: 1; overflow: hidden; position: relative; }
        .swipe-track { display: flex; width: 100%; height: 100%; transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        .page { width: 100%; flex-shrink: 0; overflow-y: auto; padding-bottom: 70px; scrollbar-width: thin; }
        .page::-webkit-scrollbar { display: none; }

        /* Bottom Navigation */
        .bottom-nav {
            background: var(--bg-primary);
            border-top: 0.5px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 8px 12px 14px;
            backdrop-filter: blur(10px);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            padding: 4px 12px;
            border-radius: 30px;
        }
        .nav-item.active { color: var(--accent-color); }
        .nav-item:active { transform: scale(0.95); }
        .nav-icon { font-size: 24px; }

        /* Stories */
        .stories-row {
            padding: 16px 0 16px 16px;
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scrollbar-width: none;
            border-bottom: 0.5px solid var(--border-color);
        }
        .stories-row::-webkit-scrollbar { display: none; }
        .story {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .story:active { transform: scale(0.95); }
        .story-ring {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--border-color);
        }
        .story.has-story .story-ring {
            background: linear-gradient(45deg, #f09433, #d62976, #962fbf, #0095f6);
            padding: 2px;
        }
        .story-avatar {
            width: 68px;
            height: 68px;
            background: var(--bg-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            overflow: hidden;
        }
        .story-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .story-name { color: var(--text-secondary); font-size: 11px; max-width: 68px; text-align: center; overflow: hidden; text-overflow: ellipsis; }

        /* Find People Section */
        .find-people-section {
            padding: 16px;
            border-bottom: 0.5px solid var(--border-color);
            background: var(--bg-primary);
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .section-header h4 { color: var(--text-primary); font-size: 14px; font-weight: 600; }
        .section-header span { color: var(--accent-color); font-size: 12px; cursor: pointer; }
        .people-list {
            display: flex;
            gap: 16px;
            overflow-x: auto;
        }
        .people-list::-webkit-scrollbar { display: none; }
        .person-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            min-width: 70px;
            transition: transform 0.2s;
        }
        .person-card:active { transform: scale(0.95); }
        .person-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #833ab4, #fd1d1d);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            overflow: hidden;
        }
        .person-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .person-name { font-size: 11px; color: var(--text-primary); text-align: center; font-weight: 500; }
        .follow-small-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        .follow-small-btn:active { transform: scale(0.95); }
        .unfollow-small-btn {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 0.5px solid var(--border-color);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            cursor: pointer;
            transition: var(--transition);
        }

        /* Post Card */
        .post-card {
            margin-bottom: 12px;
            background: var(--bg-primary);
            border-bottom: 0.5px solid var(--border-color);
            animation: fadeInUp 0.4s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .post-header { padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .post-user { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .post-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #833ab4, #fd1d1d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            transition: transform 0.2s;
        }
        .post-user:active .post-avatar { transform: scale(0.95); }
        .post-name { font-weight: 600; font-size: 14px; color: var(--text-primary); }
        .post-time { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
        .post-image {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .post-image:active { transform: scale(0.99); }
        .post-actions { padding: 8px 12px; display: flex; gap: 20px; }
        .action-btn {
            font-size: 26px;
            cursor: pointer;
            transition: transform 0.2s;
            color: var(--text-primary);
        }
        .action-btn:active { transform: scale(0.9); }
        .action-btn.liked { color: var(--like-color); animation: heartBeat 0.3s ease; }
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        .post-likes {
            padding: 0 12px 4px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            color: var(--text-primary);
        }
        .post-caption { padding: 0 12px 12px; font-size: 14px; color: var(--text-primary); line-height: 1.4; }

        /* Announcement */
        .announce-header { padding: 16px; border-bottom: 0.5px solid var(--border-color); background: var(--bg-primary); }
        .announce-header h3 { color: var(--text-primary); font-size: 18px; margin-bottom: 4px; }
        .announce-header p { color: var(--text-secondary); font-size: 12px; }
        .announcement-card {
            background: linear-gradient(135deg, rgba(0,149,246,0.08), rgba(0,0,0,0.02));
            margin: 12px;
            padding: 16px;
            border-radius: 16px;
            border-left: 4px solid var(--accent-color);
            transition: var(--transition);
        }
        .announcement-card:active { transform: scale(0.98); }
        .admin-badge {
            background: var(--accent-gradient);
            color: white;
            font-size: 10px;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .admin-panel {
            background: var(--bg-secondary);
            margin: 12px;
            padding: 16px;
            border-radius: 20px;
            border: 0.5px solid var(--border-color);
        }
        .admin-panel textarea {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 0.5px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
            resize: none;
        }
        .admin-panel button {
            width: 100%;
            margin-top: 12px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .admin-panel button:active { transform: scale(0.98); }

        /* Chat */
        .chat-tabs { display: flex; gap: 12px; padding: 12px; border-bottom: 0.5px solid var(--border-color); }
        .chat-tab {
            flex: 1;
            background: none;
            border: none;
            padding: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 30px;
            transition: var(--transition);
        }
        .chat-tab.active { background: var(--accent-gradient); color: white; }
        .chat-tab:active { transform: scale(0.95); }
        .chat-panel { display: flex; flex-direction: column; height: calc(100vh - 130px); }
        .chat-messages { flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        .message-bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 22px;
            font-size: 14px;
            animation: messageSlide 0.3s ease;
        }
        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-left { background: var(--bg-secondary); color: var(--text-primary); align-self: flex-start; border-radius: 22px 22px 22px 4px; }
        .message-right { background: var(--accent-gradient); color: white; align-self: flex-end; border-radius: 22px 22px 4px 22px; }
        .chat-input-area {
            display: flex;
            padding: 12px;
            gap: 8px;
            border-top: 0.5px solid var(--border-color);
            background: var(--bg-primary);
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: 0.5px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
        }
        .chat-input-area button {
            background: var(--accent-gradient);
            color: white;
            border: none;
            width: 44px;
            border-radius: 25px;
            cursor: pointer;
            transition: var(--transition);
        }
        .chat-input-area button:active { transform: scale(0.95); }

        /* Profile */
        .profile-header {
            padding: 20px 16px;
            display: flex;
            align-items: center;
            gap: 24px;
            border-bottom: 0.5px solid var(--border-color);
        }
        .profile-avatar-lg {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            background: linear-gradient(135deg, #833ab4, #fd1d1d);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .profile-avatar-lg:active { transform: scale(0.95); }
        .profile-avatar-lg.has-story-ring { padding: 2px; background: linear-gradient(45deg, #f09433, #d62976, #962fbf); }
        .profile-avatar-lg .inner-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        .profile-stats { display: flex; gap: 28px; text-align: center; }
        .stat-num { font-weight: 700; font-size: 18px; color: var(--text-primary); }
        .stat-label { font-size: 12px; color: var(--text-secondary); }
        .edit-btn {
            margin: 16px;
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-primary);
            transition: var(--transition);
        }
        .edit-btn:active { transform: scale(0.98); }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 4px; }
        .grid-item {
            aspect-ratio: 1;
            background: var(--bg-secondary);
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .grid-item:active { transform: scale(0.98); }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .grid-item:active img { transform: scale(1.05); }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-card {
            background: var(--bg-primary);
            border-radius: 24px;
            width: 90%;
            max-width: 340px;
            padding: 24px;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-card input, .modal-card select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 0.5px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
        }
        .modal-card button {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            margin-top: 8px;
            font-weight: 600;
            transition: var(--transition);
        }
        .modal-card button:active { transform: scale(0.98); }

        .story-viewer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .story-img { max-width: 90%; max-height: 80%; border-radius: 16px; }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 1100;
            display: none;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .fab {
            position: fixed;
            bottom: 80px;
            right: 16px;
            background: var(--accent-gradient);
            color: white;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            z-index: 200;
            transition: var(--transition);
        }
        .fab:active { transform: scale(0.92); }

        .menu-dots {
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            padding: 0 8px;
            color: var(--text-primary);
        }
        
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: var(--bg-secondary);
            border-radius: 28px;
            padding: 32px 24px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            box-shadow: var(--card-shadow);
        }
        .login-card h2 { margin-bottom: 8px; color: var(--text-primary); font-size: 24px; }
        .login-card p { color: var(--text-secondary); font-size: 13px; margin-bottom: 24px; }
        .login-card input {
            width: 100%;
            padding: 14px;
            border: 0.5px solid var(--border-color);
            border-radius: 14px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 16px;
            margin-bottom: 12px;
            text-align: center;
        }
        .login-card button {
            width: 100%;
            padding: 14px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: var(--transition);
        }
        .login-card button:active { transform: scale(0.98); }
        .otp-group { display: none; margin-top: 16px; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo"><span>🌾</span> nahantara</div>
        <div class="header-actions">
            <div class="theme-toggle" id="themeToggle">🌙</div>
            <div class="header-icon">❤️</div>
            <div class="header-icon">💬</div>
        </div>
    </div>

    <div class="swipe-container" id="swipeContainer">
        <div class="swipe-track" id="swipeTrack">
            <div class="page">
                <div class="stories-row" id="storiesList"></div>
                <div id="findPeopleContainer"></div>
                <div id="feedContainer"></div>
            </div>
            <div class="page">
                <div class="announce-header"><h3>📢 Announcements</h3><p>Stay updated with village news</p></div>
                <div id="announcementsList"></div>
                <div id="adminPanel" class="admin-panel" style="display:none;">
                    <textarea id="announceText" rows="3" placeholder="Write announcement..."></textarea>
                    <button onclick="postAnnouncement()">➕ Post Announcement</button>
                </div>
            </div>
            <div class="page">
                <div class="chat-tabs"><button id="dmTab" class="chat-tab active">💬 DM</button><button id="groupTab" class="chat-tab">👥 Group</button></div>
                <div id="dmPanel" class="chat-panel"><div class="chat-messages" id="dmMessages"></div><div class="chat-input-area"><input id="dmInput" placeholder="Message..."><button onclick="sendDM()">➤</button></div></div>
                <div id="groupPanel" class="chat-panel" style="display:none;"><div class="chat-messages" id="groupMessages"></div><div class="chat-input-area"><input id="groupInput" placeholder="Group..."><button onclick="sendGroupMsg()">➤</button></div></div>
            </div>
            <div class="page"><div id="profileArea"></div></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" data-page="0"><div class="nav-icon">🏠</div><div>Home</div></div>
        <div class="nav-item" data-page="1"><div class="nav-icon">📢</div><div>News</div></div>
        <div class="nav-item" data-page="2"><div class="nav-icon">💬</div><div>Chat</div></div>
        <div class="nav-item" data-page="3"><div class="nav-icon">👤</div><div>Profile</div></div>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script>
    // ========== THEME ==========
    let isDark = localStorage.getItem('theme') === 'dark';
    function applyTheme() {
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        document.getElementById('themeToggle').innerHTML = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
    document.getElementById('themeToggle').onclick = () => { isDark = !isDark; applyTheme(); };
    applyTheme();

    // ========== DATA STORAGE ==========
    let allUsers = JSON.parse(localStorage.getItem('nahantara_users_pro')) || [];
    let currentUser = null;
    let allPosts = JSON.parse(localStorage.getItem('nahantara_posts_pro')) || [];
    let storiesData = JSON.parse(localStorage.getItem('nahantara_stories_pro')) || [];
    let announcements = JSON.parse(localStorage.getItem('nahantara_announcements_pro')) || [];
    let dmMessages = JSON.parse(localStorage.getItem('nahantara_dm_pro')) || [];
    let groupMessages = JSON.parse(localStorage.getItem('nahantara_group_pro')) || [];
    
    function saveAll() {
        localStorage.setItem('nahantara_users_pro', JSON.stringify(allUsers));
        localStorage.setItem('nahantara_posts_pro', JSON.stringify(allPosts));
        localStorage.setItem('nahantara_stories_pro', JSON.stringify(storiesData));
        localStorage.setItem('nahantara_announcements_pro', JSON.stringify(announcements));
        localStorage.setItem('nahantara_dm_pro', JSON.stringify(dmMessages));
        localStorage.setItem('nahantara_group_pro', JSON.stringify(groupMessages));
        console.log('💾 Saved - Posts:', allPosts.length);
    }
    
    function showToast(msg) { let t = document.getElementById('toastMsg'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    function hasStory(userId) { return storiesData.some(s => s.userId === userId); }
    
    // ========== LOGIN ==========
    let pendingPhone = null;
    let generatedOTP = null;
    
    function showLogin() {
        let loginDiv = document.createElement('div');
        loginDiv.className = 'login-screen';
        loginDiv.id = 'loginScreen';
        loginDiv.innerHTML = `
            <div class="login-card">
                <h2>🌾 Welcome to Nahantara</h2>
                <p>Enter your phone number to join the village</p>
                <input type="tel" id="phoneInput" placeholder="+91 9876543210" maxlength="13">
                <button onclick="sendOTP()">Send OTP</button>
                <div class="otp-group" id="otpGroup">
                    <input type="text" id="otpInput" placeholder="Enter OTP" maxlength="6">
                    <button onclick="verifyOTP()">Verify & Login</button>
                </div>
            </div>
        `;
        document.body.appendChild(loginDiv);
    }
    
    window.sendOTP = () => {
        let phone = document.getElementById('phoneInput').value.trim();
        if (!phone || phone.length < 10) {
            alert("Enter valid phone number");
            return;
        }
        pendingPhone = phone;
        generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
        alert(`📱 Your OTP for ${phone} is: ${generatedOTP}`);
        document.getElementById('otpGroup').style.display = 'block';
    };
    
    window.verifyOTP = () => {
        let enteredOTP = document.getElementById('otpInput').value.trim();
        if (enteredOTP === generatedOTP) {
            localStorage.setItem('nahantara_verified_phone', pendingPhone);
            document.getElementById('loginScreen').remove();
            initApp();
            showToast("✅ Verified successfully!");
        } else {
            alert("Wrong OTP! Try again.");
        }
    };
    
    // ========== FIND PEOPLE ==========
    function renderFindPeople() {
        let container = document.getElementById('findPeopleContainer');
        if (!container) return;
        let otherUsers = allUsers.filter(u => u.id !== currentUser.id);
        if (otherUsers.length === 0) { container.innerHTML = ''; return; }
        let html = `<div class="find-people-section"><div class="section-header"><h4>👥 Find People to Connect</h4><span>See All →</span></div><div class="people-list">${otherUsers.map(u => {
            let isFollowing = currentUser.following.includes(u.id);
            return `<div class="person-card" onclick="viewUserProfile('${u.id}')"><div class="person-avatar">${u.avatar ? `<img src="${u.avatar}">` : u.username.charAt(0).toUpperCase()}</div><div class="person-name">${escapeHtml(u.username.slice(0, 10))}</div><button class="${isFollowing ? 'unfollow-small-btn' : 'follow-small-btn'}" onclick="event.stopPropagation(); quickFollow('${u.id}')">${isFollowing ? 'Following' : 'Follow'}</button></div>`;
        }).join('')}</div></div>`;
        container.innerHTML = html;
    }
    
    window.quickFollow = (targetId) => {
        let target = allUsers.find(u => u.id === targetId);
        if (!target) return;
        if (currentUser.following.includes(targetId)) {
            currentUser.following = currentUser.following.filter(id => id !== targetId);
            target.followers = target.followers.filter(id => id !== currentUser.id);
            showToast(`Unfollowed ${target.username}`);
        } else {
            currentUser.following.push(targetId);
            target.followers.push(currentUser.id);
            showToast(`Following ${target.username}`);
        }
        let idx = allUsers.findIndex(u => u.id === currentUser.id);
        if (idx !== -1) allUsers[idx] = currentUser;
        let tIdx = allUsers.findIndex(u => u.id === targetId);
        if (tIdx !== -1) allUsers[tIdx] = target;
        saveAll();
        renderFindPeople();
        renderHomeFeed();
        renderProfile();
        renderStories();
    };
    
    // ========== STORIES ==========
    function renderStories() {
        let container = document.getElementById('storiesList');
        if (!container) return;
        let users = allUsers.filter(u => u.id !== currentUser.id);
        let ownStory = hasStory(currentUser.id);
        let html = `<div class="story ${ownStory ? 'has-story' : ''}" onclick="uploadStory()"><div class="story-ring"><div class="story-avatar">✚</div></div><div class="story-name">Your Story</div></div>`;
        users.slice(0, 15).forEach(u => {
            let has = hasStory(u.id);
            html += `<div class="story ${has ? 'has-story' : ''}" onclick="viewUserProfile('${u.id}')"><div class="story-ring"><div class="story-avatar">${u.avatar ? `<img src="${u.avatar}">` : u.username.charAt(0).toUpperCase()}</div></div><div class="story-name">${u.username.slice(0, 12)}</div></div>`;
        });
        container.innerHTML = html;
    }
    
    function uploadStory() {
        let inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
        inp.onchange = e => {
            let file = e.target.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = ev => {
                    storiesData.push({ id: Date.now(), userId: currentUser.id, username: currentUser.username, image: ev.target.result, timestamp: Date.now() });
                    saveAll();
                    renderStories();
                    renderProfile();
                    showToast("📸 Story uploaded! (24h auto-delete)");
                };
                reader.readAsDataURL(file);
            }
        };
        inp.click();
    }
    
    function viewStory(userId) {
        let stories = storiesData.filter(s => s.userId === userId).sort((a, b) => a.timestamp - b.timestamp);
        if (!stories.length) { showToast("No stories"); return; }
        let idx = 0, modal = document.createElement('div'); modal.className = 'story-viewer';
        let img = document.createElement('img'); img.className = 'story-img';
        let close = document.createElement('div'); close.innerText = '✕'; close.style.cssText = 'position:absolute; top:20px; right:20px; color:white; font-size:32px; cursor:pointer; z-index:2001;';
        close.onclick = () => modal.remove();
        let update = () => img.src = stories[idx].image;
        update();
        modal.append(img, close); document.body.appendChild(modal);
        modal.onclick = () => modal.remove();
    }
    
    // ========== POST FUNCTIONS ==========
    function toggleLike(postId) {
        let post = allPosts.find(p => p.id == postId);
        if (post) {
            if (post.likes.includes(currentUser.id)) post.likes = post.likes.filter(id => id !== currentUser.id);
            else post.likes.push(currentUser.id);
            saveAll();
            renderHomeFeed();
        }
    }
    
    function addComment(postId, text) {
        if (!text.trim()) return;
        let post = allPosts.find(p => p.id == postId);
        if (post) {
            post.comments.push({ userId: currentUser.id, username: currentUser.username, text: text });
            saveAll();
            renderHomeFeed();
        }
    }
    
    function showLikesModal(postId) {
        let post = allPosts.find(p => p.id == postId);
        if (!post || !post.likes.length) { showToast("No likes yet"); return; }
        let likers = post.likes.map(uid => allUsers.find(u => u.id === uid)).filter(u => u);
        let modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-card"><h3>❤️ Likes (${post.likes.length})</h3>${likers.map(u => `<div style="padding:8px;">${escapeHtml(u.username)}</div>`).join('')}<button onclick="this.parentElement.parentElement.remove()">Close</button></div>`;
        document.body.appendChild(modal);
    }
    
    function editPost(postId) {
        let post = allPosts.find(p => p.id == postId);
        if (post && post.userId === currentUser.id) {
            let newText = prompt("Edit caption:", post.text);
            if (newText !== null) { post.text = newText; saveAll(); renderHomeFeed(); showToast("Post updated"); }
        }
    }
    
    function deletePost(postId) {
        if (confirm("Delete this post?")) {
            allPosts = allPosts.filter(p => p.id !== postId);
            saveAll();
            renderHomeFeed();
            renderProfile();
            showToast("Post deleted");
        }
    }
    
    function showPostMenu(postId, event) {
        event.stopPropagation();
        let post = allPosts.find(p => p.id == postId);
        if (!post || post.userId !== currentUser.id) return;
        let modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-card"><h3>Post Options</h3><button onclick="editPost(${postId}); this.parentElement.parentElement.remove();">✏️ Edit</button><button onclick="deletePost(${postId}); this.parentElement.parentElement.remove();" style="color:#ed4956;">🗑️ Delete</button><button onclick="this.parentElement.parentElement.remove()">Cancel</button></div>`;
        document.body.appendChild(modal);
    }
    
    function renderHomeFeed() {
        let feedDiv = document.getElementById('feedContainer');
        if (!feedDiv) return;
        if (!allPosts.length) {
            feedDiv.innerHTML = '<div style="text-align:center;padding:60px 20px;"><div style="font-size:48px;margin-bottom:16px;">🌾</div><h3 style="color:var(--text-primary);">No posts yet</h3><p style="color:var(--text-secondary);">Click + to create your first post!</p></div>';
            return;
        }
        feedDiv.innerHTML = allPosts.map(post => `
            <div class="post-card">
                <div class="post-header">
                    <div class="post-user" onclick="viewUserProfile('${post.userId}')">
                        <div class="post-avatar">${post.username.charAt(0).toUpperCase()}</div>
                        <div><div class="post-name">${escapeHtml(post.username)}${post.userId === currentUser.id ? ' • you' : ''}</div><div class="post-time">${post.timeAgo || new Date(post.timestamp).toLocaleString()}</div></div>
                    </div>
                    ${post.userId === currentUser.id ? `<div class="menu-dots" onclick="showPostMenu(${post.id}, event)">⋯</div>` : ''}
                </div>
                ${post.image ? `<img src="${post.image}" class="post-image" onclick="openFullImage('${post.image}')">` : ''}
                <div class="post-actions">
                    <div class="action-btn ${post.likes && post.likes.includes(currentUser.id) ? 'liked' : ''}" onclick="toggleLike(${post.id})">❤️</div>
                    <div class="action-btn" onclick="toggleCommentBox(${post.id})">💬</div>
                </div>
                <div class="post-likes" onclick="showLikesModal(${post.id})">❤️ ${post.likes ? post.likes.length : 0} likes</div>
                <div class="post-caption"><strong>${escapeHtml(post.username)}</strong> ${escapeHtml(post.text || '')}</div>
                <div id="commentBox-${post.id}" style="display:none; padding:8px 12px;">
                    <div>${post.comments && post.comments.map(c => `<div><strong>${escapeHtml(c.username)}</strong> ${escapeHtml(c.text)}</div>`).join('') || ''}</div>
                    <div style="display:flex; gap:8px; margin-top:8px;"><input id="commentInput-${post.id}" placeholder="Add comment..." style="flex:1; padding:10px; border-radius:25px; border:0.5px solid var(--border-color); background:var(--bg-secondary); color:var(--text-primary);"><button onclick="submitComment(${post.id})" style="padding:8px 16px; background:var(--accent-gradient); color:white; border:none; border-radius:25px; cursor:pointer;">Post</button></div>
                </div>
            </div>
        `).join('');
    }
    
    window.submitComment = (postId) => { let inp = document.getElementById(`commentInput-${postId}`); if (inp && inp.value.trim()) { addComment(postId, inp.value); inp.value = ''; } };
    window.toggleCommentBox = (id) => { let box = document.getElementById(`commentBox-${id}`); if (box) box.style.display = box.style.display === 'none' ? 'block' : 'none'; };
    window.openFullImage = (src) => { let modal = document.createElement('div'); modal.style.cssText = 'position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.95); z-index:2000; display:flex; align-items:center; justify-content:center;'; modal.innerHTML = `<img src="${src}" style="max-width:90%; max-height:80%; border-radius:16px;"><div style="position:absolute; top:30px; right:30px; color:white; font-size:40px; cursor:pointer;" onclick="this.parentElement.remove()">✕</div>`; document.body.appendChild(modal); };
    
    // ========== ANNOUNCEMENTS ==========
    function renderAnnouncements() {
        let cont = document.getElementById('announcementsList');
        if (!cont) return;
        if (!announcements.length) cont.innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-secondary);">📭 No announcements yet</div>';
        else cont.innerHTML = announcements.map(a => `<div class="announcement-card"><div class="admin-badge">👑 ${escapeHtml(a.adminName)}</div><div style="margin:8px 0;">${escapeHtml(a.text)}</div><div style="font-size:10px; color:var(--text-secondary);">${new Date(a.timestamp).toLocaleString()}</div></div>`).join('');
        let panel = document.getElementById('adminPanel');
        if (panel) panel.style.display = currentUser.role === 'admin' ? 'block' : 'none';
    }
    
    window.postAnnouncement = () => {
        if (currentUser.role !== 'admin') { showToast("Only admin can post announcements"); return; }
        let text = document.getElementById('announceText')?.value.trim();
        if (!text) { showToast("Write announcement first"); return; }
        announcements.unshift({ id: Date.now(), adminId: currentUser.id, adminName: currentUser.username, text, timestamp: Date.now() });
        saveAll();
        renderAnnouncements();
        document.getElementById('announceText').value = '';
        showToast("📢 Announcement posted!");
    };
    
    // ========== CHAT ==========
    function renderDM() { let d = document.getElementById('dmMessages'); if (d) d.innerHTML = dmMessages.map(m => `<div class="message-bubble ${m.senderId === currentUser.id ? 'message-right' : 'message-left'}">${escapeHtml(m.text)}<div style="font-size:10px;">${m.time}</div></div>`).join(''); d?.scrollTo(0, d.scrollHeight); }
    function renderGroup() { let g = document.getElementById('groupMessages'); if (g) g.innerHTML = groupMessages.map(m => `<div class="message-bubble ${m.senderId === currentUser.id ? 'message-right' : 'message-left'}"><strong>${escapeHtml(m.senderName)}</strong> ${escapeHtml(m.text)}<div style="font-size:9px;">${m.time}</div></div>`).join(''); g?.scrollTo(0, g.scrollHeight); }
    window.sendDM = () => { let inp = document.getElementById('dmInput'); if (inp && inp.value.trim()) { dmMessages.push({ senderId: currentUser.id, senderName: currentUser.username, text: inp.value, time: new Date().toLocaleTimeString() }); saveAll(); renderDM(); inp.value = ''; } };
    window.sendGroupMsg = () => { let inp = document.getElementById('groupInput'); if (inp && inp.value.trim()) { groupMessages.push({ senderId: currentUser.id, senderName: currentUser.username, text: inp.value, time: new Date().toLocaleTimeString() }); saveAll(); renderGroup(); inp.value = ''; } };
    function initChatTabs() { let dmBtn = document.getElementById('dmTab'), grpBtn = document.getElementById('groupTab'); if (dmBtn && grpBtn) { dmBtn.onclick = () => { document.getElementById('dmPanel').style.display = 'flex'; document.getElementById('groupPanel').style.display = 'none'; dmBtn.classList.add('active'); grpBtn.classList.remove('active'); renderDM(); }; grpBtn.onclick = () => { document.getElementById('dmPanel').style.display = 'none'; document.getElementById('groupPanel').style.display = 'flex'; grpBtn.classList.add('active'); dmBtn.classList.remove('active'); renderGroup(); }; } }
    
    // ========== PROFILE ==========
    function renderProfile() {
        let container = document.getElementById('profileArea');
        if (!container) return;
        let userPosts = allPosts.filter(p => p.userId === currentUser.id);
        let hasUserStory = hasStory(currentUser.id);
        container.innerHTML = `
            <div class="profile-header">
                <div class="profile-avatar-lg ${hasUserStory ? 'has-story-ring' : ''}" onclick="if(hasStory('${currentUser.id}')) viewStory('${currentUser.id}'); else showToast('No story')">
                    <div class="inner-avatar" onclick="event.stopPropagation(); uploadProfilePicture()">${currentUser.avatar ? `<img src="${currentUser.avatar}" style="width:100%; height:100%; object-fit:cover;">` : currentUser.username.charAt(0).toUpperCase()}</div>
                </div>
                <div class="profile-stats"><div><div class="stat-num">${userPosts.length}</div><div class="stat-label">posts</div></div><div><div class="stat-num">${currentUser.followers.length}</div><div class="stat-label">followers</div></div><div><div class="stat-num">${currentUser.following.length}</div><div class="stat-label">following</div></div></div>
            </div>
            <div class="edit-btn" onclick="openEditModal()">✏️ Edit Profile</div>
            <div style="padding:0 16px 12px;"><strong style="color:var(--text-primary);">${escapeHtml(currentUser.username)}</strong> ${currentUser.role === 'admin' ? '👑 Admin' : '🌾 User'}<br><span style="color:var(--text-secondary);">📱 ${currentUser.phone}</span><br>${escapeHtml(currentUser.bio)}</div>
            <div class="profile-grid" id="userPostGrid"></div>
        `;
        let grid = document.getElementById('userPostGrid');
        if (grid) {
            let userImages = userPosts.filter(p => p.image);
            if (!userImages.length) grid.innerHTML = '<div style="grid-column:span3; text-align:center; padding:40px; color:var(--text-secondary);">No posts yet</div>';
            else grid.innerHTML = userImages.map(p => `<div class="grid-item" onclick="openFullImage('${p.image}')"><img src="${p.image}"></div>`).join('');
        }
    }
    
    window.openEditModal = () => {
        let modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-card"><h3>Edit Profile</h3><input id="editName" placeholder="Username" value="${escapeHtml(currentUser.username)}"><input id="editBio" placeholder="Bio" value="${escapeHtml(currentUser.bio)}"><select id="editRole"><option value="user" ${currentUser.role === 'user' ? 'selected' : ''}>🌾 User</option><option value="admin" ${currentUser.role === 'admin' ? 'selected' : ''}>👑 Admin</option></select><div id="codeDiv" style="display:${currentUser.role === 'admin' ? 'block' : 'none'};"><input id="adminCode" type="password" placeholder="Admin Code (7)"><small>Enter "7" to become admin</small></div><button onclick="saveProfileEdit()" style="background:var(--accent-gradient); color:white;">Save</button><button onclick="this.parentElement.parentElement.remove()">Cancel</button></div>`;
        document.body.appendChild(modal);
        let roleSelect = document.getElementById('editRole');
        let codeDiv = document.getElementById('codeDiv');
        roleSelect.onchange = () => codeDiv.style.display = roleSelect.value === 'admin' ? 'block' : 'none';
    };
    
    window.saveProfileEdit = () => {
        let newName = document.getElementById('editName').value.trim();
        let newBio = document.getElementById('editBio').value.trim();
        let newRole = document.getElementById('editRole').value;
        let code = document.getElementById('adminCode')?.value;
        if (newRole === 'admin' && code !== '7') { showToast("Invalid admin code! Use '7'"); return; }
        if (newName) currentUser.username = newName;
        if (newBio) currentUser.bio = newBio;
        currentUser.role = newRole;
        let idx = allUsers.findIndex(u => u.id === currentUser.id);
        if (idx !== -1) allUsers[idx] = currentUser;
        saveAll();
        document.querySelector('.modal-overlay')?.remove();
        renderProfile(); renderHomeFeed(); renderStories(); renderAnnouncements(); renderFindPeople();
        showToast(`Profile updated!`);
    };
    
    window.uploadProfilePicture = () => {
        let inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
        inp.onchange = (e) => {
            let file = e.target.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = (ev) => {
                    currentUser.avatar = ev.target.result;
                    let idx = allUsers.findIndex(u => u.id === currentUser.id);
                    if (idx !== -1) allUsers[idx] = currentUser;
                    saveAll();
                    renderProfile(); renderStories(); renderHomeFeed(); renderFindPeople();
                    showToast("Profile picture updated");
                };
                reader.readAsDataURL(file);
            }
        };
        inp.click();
    };
    
    // ========== VIEW USER PROFILE ==========
    window.viewUserProfile = (userId) => {
        let targetUser = allUsers.find(u => u.id === userId);
        if (!targetUser || targetUser.id === currentUser.id) return;
        let isFollowing = currentUser.following.includes(targetUser.id);
        let hasUserStory = hasStory(targetUser.id);
        let modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-card"><div style="text-align:center; margin-bottom:16px;"><div class="story-avatar" style="width:80px; height:80px; margin:0 auto 12px;">${targetUser.avatar ? `<img src="${targetUser.avatar}" style="width:100%;border-radius:50%;">` : targetUser.username.charAt(0).toUpperCase()}</div><h3 style="color:var(--text-primary);">${escapeHtml(targetUser.username)}</h3><p style="color:var(--text-secondary);">📱 ${targetUser.phone}</p><p style="color:var(--text-secondary);">${targetUser.followers.length} followers</p><p style="margin:8px 0; color:var(--text-primary);">${escapeHtml(targetUser.bio)}</p></div><button onclick="followUser('${targetUser.id}'); this.parentElement.parentElement.remove();" style="background:${isFollowing ? 'var(--bg-secondary)' : 'var(--accent-gradient)'}; color:${isFollowing ? 'var(--text-primary)' : 'white'};">${isFollowing ? 'Unfollow' : 'Follow'}</button><button onclick="if(${hasUserStory}) { this.parentElement.parentElement.remove(); viewStory('${targetUser.id}'); } else { showToast('No story'); }" style="margin-top:8px;">📸 View Story</button><button onclick="this.parentElement.parentElement.remove()" style="margin-top:8px; background:var(--bg-secondary); color:var(--text-primary);">Close</button></div>`;
        document.body.appendChild(modal);
    };
    
    window.followUser = (targetId) => {
        let target = allUsers.find(u => u.id === targetId);
        if (!target || target.id === currentUser.id) return;
        if (currentUser.following.includes(targetId)) {
            currentUser.following = currentUser.following.filter(id => id !== targetId);
            target.followers = target.followers.filter(id => id !== currentUser.id);
            showToast(`Unfollowed ${target.username}`);
        } else {
            currentUser.following.push(targetId);
            target.followers.push(currentUser.id);
            showToast(`Following ${target.username}`);
        }
        let idx = allUsers.findIndex(u => u.id === currentUser.id);
        if (idx !== -1) allUsers[idx] = currentUser;
        let tIdx = allUsers.findIndex(u => u.id === targetId);
        if (tIdx !== -1) allUsers[tIdx] = target;
        saveAll();
        renderHomeFeed(); renderProfile(); renderStories(); renderFindPeople();
    };
    
    // ========== NAVIGATION ==========
    function setupNavigation() {
        let currentPage = 0;
        const track = document.getElementById('swipeTrack');
        const navItems = document.querySelectorAll('.nav-item');
        function goToPage(pageIndex) {
            if (pageIndex < 0 || pageIndex > 3) return;
            currentPage = pageIndex;
            if (track) track.style.transform = `translateX(-${currentPage * 100}%)`;
            navItems.forEach((item, i) => { if (i === currentPage) item.classList.add('active'); else item.classList.remove('active'); });
            if (currentPage === 0) { renderHomeFeed(); renderStories(); renderFindPeople(); }
            if (currentPage === 1) renderAnnouncements();
            if (currentPage === 2) { renderDM(); renderGroup(); initChatTabs(); }
            if (currentPage === 3) renderProfile();
        }
        navItems.forEach((item, idx) => item.addEventListener('click', () => goToPage(idx)));
        let touchStartX = 0;
        const container = document.getElementById('swipeContainer');
        container.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; });
        container.addEventListener('touchend', (e) => { let endX = e.changedTouches[0].screenX; let diff = endX - touchStartX; if (Math.abs(diff) > 50) { if (diff > 0 && currentPage > 0) goToPage(currentPage - 1); else if (diff < 0 && currentPage < 3) goToPage(currentPage + 1); } });
        goToPage(0);
    }
    
    function setupFab() {
        let fab = document.createElement('div'); fab.className = 'fab'; fab.innerHTML = '✚';
        fab.onclick = () => {
            let caption = prompt("📝 Write caption (optional):");
            let fileInput = document.createElement('input'); fileInput.type = 'file'; fileInput.accept = 'image/*';
            fileInput.onchange = (e) => {
                let file = e.target.files[0];
                if (file) {
                    let reader = new FileReader();
                    reader.onload = (ev) => {
                        let newPost = { id: Date.now(), userId: currentUser.id, username: currentUser.username, text: caption || '', image: ev.target.result, likes: [], comments: [], timestamp: Date.now(), timeAgo: new Date().toLocaleString() };
                        allPosts.unshift(newPost);
                        saveAll();
                        renderHomeFeed();
                        renderProfile();
                        showToast("✅ Posted! Everyone can see it.");
                    };
                    reader.readAsDataURL(file);
                } else {
                    let newPost = { id: Date.now(), userId: currentUser.id, username: currentUser.username, text: caption || '', image: null, likes: [], comments: [], timestamp: Date.now(), timeAgo: new Date().toLocaleString() };
                    allPosts.unshift(newPost);
                    saveAll();
                    renderHomeFeed();
                    renderProfile();
                    showToast("✅ Posted!");
                }
            };
            fileInput.click();
        };
        document.querySelector('.app').appendChild(fab);
    }
    
    function setupPullToRefresh() {
        const container = document.getElementById('swipeContainer');
        let startY = 0, refreshing = false;
        container.addEventListener('touchstart', (e) => { if (container.scrollTop === 0) startY = e.touches[0].clientY; });
        container.addEventListener('touchmove', (e) => {
            if (container.scrollTop === 0 && e.touches[0].clientY - startY > 60 && !refreshing) {
                refreshing = true;
                let loader = document.createElement('div'); loader.className = 'spinner'; loader.style.margin = '20px auto';
                document.querySelector('.page').prepend(loader);
                setTimeout(() => {
                    renderHomeFeed(); renderStories(); renderProfile(); renderFindPeople();
                    loader.remove();
                    refreshing = false;
                    showToast("✨ Updated!");
                }, 800);
            }
        });
    }
    
    function initApp() {
        let verifiedPhone = localStorage.getItem('nahantara_verified_phone');
        if (!verifiedPhone) { showLogin(); return; }
        
        currentUser = allUsers.find(u => u.phone === verifiedPhone);
        if (!currentUser) {
            let newUser = {
                id: 'user_' + Date.now(),
                phone: verifiedPhone,
                username: 'User_' + verifiedPhone.slice(-6),
                bio: '🌾 Living my best life in Nahantara',
                avatar: null,
                followers: [],
                following: [],
                role: 'user',
                createdAt: Date.now()
            };
            allUsers.push(newUser);
            currentUser = newUser;
            saveAll();
            showToast(`✨ Welcome ${currentUser.username}!`);
        }
        
        renderHomeFeed();
        renderStories();
        renderFindPeople();
        renderAnnouncements();
        renderDM();
        renderGroup();
        renderProfile();
        setupNavigation();
        setupFab();
        setupPullToRefresh();
    }
    
    initApp();
</script>
</body>
</html>
