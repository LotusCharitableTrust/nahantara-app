<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ନହନ୍ତରା - ମୋ ସ୍ବାଭିମାନ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans Oriya', sans-serif;
            background: #000;
        }

        /* App Container */
        .app {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Header - Instagram Style */
        .header {
            background: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #dbdbdb;
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #1a8e3c, #0d5c26);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo span {
            font-size: 24px;
        }

        .header-icons {
            display: flex;
            gap: 18px;
        }

        .header-icons div {
            font-size: 24px;
            cursor: pointer;
        }

        /* Content Area */
        .content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 60px;
            background: #fafafa;
        }

        /* Screens */
        .screen {
            display: none;
        }

        .screen.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ============ HOME PAGE - BEAUTIFUL ============ */
        .hero-section {
            background: linear-gradient(135deg, #1a8e3c, #0d5c26);
            padding: 30px 20px;
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .hero-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .hero-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .hero-subtitle {
            font-size: 14px;
            opacity: 0.9;
        }

        .welcome-card {
            background: white;
            margin: -20px 16px 20px 16px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .welcome-card h3 {
            color: #1a8e3c;
            margin-bottom: 8px;
        }

        .welcome-card p {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 16px;
            margin-bottom: 20px;
        }

        .feature-card {
            background: white;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .feature-card:active {
            transform: scale(0.97);
        }

        .feature-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .feature-name {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        .recent-posts {
            padding: 0 16px;
        }

        .recent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .recent-header h4 {
            color: #333;
            font-size: 16px;
        }

        .recent-header span {
            color: #1a8e3c;
            font-size: 13px;
            cursor: pointer;
        }

        /* ============ POSTS - INSTAGRAM STYLE ============ */
        .story-section {
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #dbdbdb;
        }

        .story-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
        }

        .story-item {
            text-align: center;
            min-width: 70px;
        }

        .story-ring {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433, #d62976, #962fbf);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
        }

        .story-ring div {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        .story-name {
            font-size: 11px;
            color: #666;
        }

        /* Instagram Post Card */
        .post-card {
            background: white;
            margin-bottom: 12px;
            border-bottom: 1px solid #dbdbdb;
        }

        .post-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
        }

        .post-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .post-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #1a8e3c, #0d5c26);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .post-name {
            font-weight: 600;
            font-size: 14px;
        }

        .post-time {
            font-size: 10px;
            color: #888;
        }

        .post-menu {
            font-size: 20px;
            cursor: pointer;
        }

        .post-image {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
            background: #f0f0f0;
        }

        .post-actions-bar {
            display: flex;
            gap: 18px;
            padding: 10px 16px;
        }

        .post-actions-bar span {
            font-size: 26px;
            cursor: pointer;
        }

        .post-actions-bar span.liked {
            color: #e74c3c;
        }

        .post-likes {
            padding: 0 16px 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .post-caption {
            padding: 0 16px 12px;
            font-size: 14px;
        }

        .post-caption strong {
            margin-right: 8px;
        }

        /* Posts Grid - Instagram Explore Style */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background: #fff;
        }

        .grid-item {
            aspect-ratio: 1;
            width: 100%;
            object-fit: cover;
            cursor: pointer;
        }

        /* Chat */
        .chat-area {
            background: white;
            height: calc(100vh - 120px);
            display: flex;
            flex-direction: column;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .msg {
            margin-bottom: 12px;
        }

        .msg-user {
            font-weight: 600;
            font-size: 12px;
            color: #1a8e3c;
        }

        .msg-text {
            background: #f0f0f0;
            padding: 10px 14px;
            border-radius: 20px;
            display: inline-block;
            max-width: 80%;
            font-size: 14px;
        }

        .msg-right {
            text-align: right;
        }

        .msg-right .msg-text {
            background: #1a8e3c;
            color: white;
        }

        .chat-input {
            display: flex;
            gap: 10px;
            padding: 12px;
            border-top: 1px solid #dbdbdb;
            background: white;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: none;
            background: #f0f0f0;
            border-radius: 25px;
            font-size: 14px;
        }

        .chat-input button {
            width: 45px;
            background: #1a8e3c;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }

        /* SOS */
        .sos-big-btn {
            background: linear-gradient(135deg, #dc3545, #b02a37);
            color: white;
            text-align: center;
            padding: 25px;
            margin: 16px;
            border-radius: 60px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .help-card {
            background: white;
            margin: 12px 16px;
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .help-card textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-family: inherit;
            resize: vertical;
            margin-bottom: 10px;
        }

        .help-card button {
            width: 100%;
            padding: 12px;
            background: #1a8e3c;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Profile */
        .profile-header {
            background: linear-gradient(135deg, #1a8e3c, #0d5c26);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .profile-avatar-large {
            width: 90px;
            height: 90px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            margin: 0 auto 15px;
            cursor: pointer;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
        }

        .profile-stats div {
            text-align: center;
        }

        .profile-stats .num {
            font-size: 18px;
            font-weight: bold;
        }

        .profile-stats .label {
            font-size: 11px;
            opacity: 0.8;
        }

        .profile-info {
            background: white;
            padding: 20px;
            margin: 16px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .profile-info input, .profile-info select {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-size: 14px;
        }

        .profile-info button {
            width: 100%;
            padding: 12px;
            background: #1a8e3c;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }

        .logout-btn {
            background: #dc3545 !important;
            margin-top: 10px;
        }

        /* Bottom Navigation - Instagram Style */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 16px;
            border-top: 1px solid #dbdbdb;
            z-index: 100;
        }

        .nav-item {
            text-align: center;
            cursor: pointer;
            padding: 5px;
            border-radius: 30px;
        }

        .nav-item.active {
            color: #1a8e3c;
        }

        .nav-icon {
            font-size: 26px;
        }

        .nav-label {
            font-size: 10px;
            margin-top: 2px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #888;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 200;
            display: none;
        }
    </style>
</head>
<body>

<div class="app">
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <span>🌾</span> ନହନ୍ତରା
        </div>
        <div class="header-icons">
            <div>❤️</div>
            <div>💬</div>
        </div>
    </div>

    <div class="content">
        <!-- Home Screen -->
        <div id="homeScreen" class="screen active">
            <div class="hero-section">
                <div class="hero-icon">🌾🙏🌾</div>
                <div class="hero-title">ମୋ ନହନ୍ତରା</div>
                <div class="hero-subtitle">ମୋ ସ୍ବାଭିମାନ</div>
            </div>

            <div class="welcome-card">
                <h3>✨ ସ୍ଵାଗତମ୍ ✨</h3>
                <p>ନହନ୍ତରା ଗାଁର ଡିଜିଟାଲ୍ ପରିବାରରେ ଆପଣଙ୍କୁ ସ୍ଵାଗତ। ଏଠାରେ ଆପଣ ଗାଁର ଖବର, ଫଟୋ, ଚାଟ୍ ଏବଂ ସହାୟତା ପାଇପାରିବେ।</p>
            </div>

            <div class="features-grid">
                <div class="feature-card" onclick="changeScreen('posts')">
                    <div class="feature-icon">📸</div>
                    <div class="feature-name">ପୋଷ୍ଟ</div>
                </div>
                <div class="feature-card" onclick="changeScreen('chat')">
                    <div class="feature-icon">💬</div>
                    <div class="feature-name">ଚାଟ୍</div>
                </div>
                <div class="feature-card" onclick="changeScreen('sos')">
                    <div class="feature-icon">🆘</div>
                    <div class="feature-name">SOS</div>
                </div>
                <div class="feature-card" onclick="changeScreen('profile')">
                    <div class="feature-icon">👤</div>
                    <div class="feature-name">ପ୍ରୋଫାଇଲ୍</div>
                </div>
            </div>

            <div class="recent-posts">
                <div class="recent-header">
                    <h4>🔥 ତାଜା ପୋଷ୍ଟ</h4>
                    <span onclick="changeScreen('posts')">ସବୁ ଦେଖ →</span>
                </div>
                <div id="recentPostsList"></div>
            </div>
        </div>

        <!-- Posts Screen (Instagram Style) -->
        <div id="postsScreen" class="screen">
            <div id="allPostsList"></div>
        </div>

        <!-- Chat Screen -->
        <div id="chatScreen" class="screen">
            <div class="chat-area">
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="ସନ୍ଦେଶ ଲେଖନ୍ତୁ...">
                    <button onclick="sendChatMsg()">➤</button>
                </div>
            </div>
        </div>

        <!-- SOS Screen -->
        <div id="sosScreen" class="screen">
            <div class="sos-big-btn" onclick="sendSOS()">
                🆘 SOS - ଜରୁରୀ ସହାୟତା
            </div>
            
            <div class="help-card">
                <textarea id="corruptionText" rows="3" placeholder="⚠️ ଦୁର୍ନୀତି ରିପୋର୍ଟ... (କେଉଁଠାରେ? କିଏ? କେତେ?)"></textarea>
                <button onclick="reportCorruption()">📢 ରିପୋର୍ଟ କରନ୍ତୁ</button>
            </div>

            <div class="help-card">
                <textarea id="helpText" rows="3" placeholder="🛠️ ସମସ୍ୟା... (ବିଜୁଳି, ପାଣି, ରାସ୍ତା, ବନ୍ୟା)"></textarea>
                <button onclick="requestHelp()">🙏 ସହାୟତା ଚାହିଁ</button>
            </div>

            <div id="requestsList"></div>
        </div>

        <!-- Profile Screen -->
        <div id="profileScreen" class="screen">
            <div class="profile-header">
                <div class="profile-avatar-large" onclick="document.getElementById('avatarFile').click()">
                    <span id="avatarEmoji">👤</span>
                </div>
                <div id="profileNameDisplay" class="profile-name">ଗ୍ରାମୀଣ</div>
                <div class="profile-stats">
                    <div>
                        <div class="num" id="userPostCount">0</div>
                        <div class="label">ପୋଷ୍ଟ</div>
                    </div>
                    <div>
                        <div class="num" id="userLikeCount">0</div>
                        <div class="label">ଲାଇକ୍</div>
                    </div>
                </div>
                <input type="file" id="avatarFile" accept="image/*" style="display:none">
            </div>
            <div class="profile-info">
                <input type="text" id="userName" placeholder="ଆପଣଙ୍କର ନାମ">
                <input type="text" id="userVillage" placeholder="ମୋହଲ୍ଲା / ଗାଁ">
                <select id="userRole">
                    <option value="user">🌾 ସାଧାରଣ ସଦସ୍ୟ</option>
                    <option value="admin">👑 ପ୍ରଶାସକ</option>
                </select>
                <button onclick="saveUserProfile()">💾 ସେଭ୍ କରନ୍ତୁ</button>
                <button class="logout-btn" onclick="logout()">🚪 ଲଗ୍ ଆଉଟ୍</button>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="changeScreen('home')">
            <div class="nav-icon">🏠</div>
            <div class="nav-label">ହୋମ୍</div>
        </div>
        <div class="nav-item" onclick="changeScreen('posts')">
            <div class="nav-icon">📸</div>
            <div class="nav-label">ପୋଷ୍ଟ</div>
        </div>
        <div class="nav-item" onclick="changeScreen('chat')">
            <div class="nav-icon">💬</div>
            <div class="nav-label">ଚାଟ୍</div>
        </div>
        <div class="nav-item" onclick="changeScreen('sos')">
            <div class="nav-icon">🆘</div>
            <div class="nav-label">SOS</div>
        </div>
        <div class="nav-item" onclick="changeScreen('profile')">
            <div class="nav-icon">👤</div>
            <div class="nav-label">ମୋର</div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // ============ DATA ============
    let currentUser = JSON.parse(localStorage.getItem('currentUser')) || {
        id: 'user_' + Date.now(),
        name: '',
        village: '',
        role: 'user',
        avatar: '👤',
        likedPosts: []
    };
    
    let posts = JSON.parse(localStorage.getItem('posts')) || [];
    let messages = JSON.parse(localStorage.getItem('messages')) || [];
    let helpReqs = JSON.parse(localStorage.getItem('helpReqs')) || [];

    localStorage.setItem('currentUser', JSON.stringify(currentUser));

    // ============ NAVIGATION ============
    function changeScreen(screen) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screen + 'Screen').classList.add('active');
        
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        if (event && event.target) {
            event.target.closest('.nav-item').classList.add('active');
        } else {
            let index = {home:0, posts:1, chat:2, sos:3, profile:4}[screen];
            document.querySelectorAll('.nav-item')[index]?.classList.add('active');
        }
        
        if (screen === 'home') { loadPosts(); loadRecentPosts(); }
        if (screen === 'posts') loadPosts();
        if (screen === 'chat') loadChat();
        if (screen === 'sos') loadRequests();
        if (screen === 'profile') loadProfile();
        updateProfileStats();
    }

    // ============ CREATE POST ============
    function createPost() {
        let text = document.getElementById('postText')?.value || '';
        let file = document.getElementById('postFile')?.files[0];
        
        if (!text && !file) {
            showToast('କିଛି ଲେଖନ୍ତୁ କିମ୍ବା ଫଟୋ ଦିଅନ୍ତୁ');
            return;
        }
        
        let post = {
            id: Date.now(),
            text: text,
            userName: currentUser.name || 'ଗ୍ରାମୀଣ',
            userId: currentUser.id,
            userAvatar: currentUser.avatar,
            time: new Date().toLocaleString(),
            timestamp: Date.now(),
            likes: [],
            image: null
        };
        
        if (file) {
            let reader = new FileReader();
            reader.onload = function(e) {
                post.image = e.target.result;
                posts.unshift(post);
                savePosts();
                showToast('✅ ପୋଷ୍ଟ ହେଲା!');
                document.getElementById('postText').value = '';
                document.getElementById('postFile').value = '';
            };
            reader.readAsDataURL(file);
        } else {
            posts.unshift(post);
            savePosts();
            showToast('✅ ପୋଷ୍ଟ ହେଲା!');
            document.getElementById('postText').value = '';
        }
    }
    
    function savePosts() {
        localStorage.setItem('posts', JSON.stringify(posts));
        loadPosts();
        loadRecentPosts();
        updateProfileStats();
    }
    
    function loadPosts() {
        let container = document.getElementById('allPostsList');
        if (!container) return;
        
        if (posts.length === 0) {
            container.innerHTML = '<div class="empty-state">🌾 କୋଉଠି ପୋଷ୍ଟ ନାହିଁ<br>ପ୍ରଥମ ପୋଷ୍ଟ କରନ୍ତୁ!</div>';
            return;
        }
        
        container.innerHTML = posts.map(post => `
            <div class="post-card">
                <div class="post-header">
                    <div class="post-user">
                        <div class="post-avatar">${post.userName.charAt(0).toUpperCase()}</div>
                        <div>
                            <div class="post-name">${post.userName} ${post.userId === currentUser.id ? '• ଆପଣ' : ''}</div>
                            <div class="post-time">${post.time}</div>
                        </div>
                    </div>
                    <div class="post-menu" onclick="deletePost(${post.id})">${(currentUser.role === 'admin' || post.userId === currentUser.id) ? '⋯' : ''}</div>
                </div>
                ${post.image ? `<img src="${post.image}" class="post-image" onclick="viewImage('${post.image}')">` : ''}
                <div class="post-actions-bar">
                    <span onclick="likePost(${post.id})" class="${post.likes.includes(currentUser.id) ? 'liked' : ''}">❤️</span>
                    <span>💬</span>
                    <span>📤</span>
                </div>
                <div class="post-likes">${post.likes.length} likes</div>
                <div class="post-caption">
                    <strong>${post.userName}</strong> ${post.text || ''}
                </div>
            </div>
        `).join('');
    }
    
    function loadRecentPosts() {
        let container = document.getElementById('recentPostsList');
        if (!container) return;
        
        let recent = posts.slice(0, 3);
        if (recent.length === 0) {
            container.innerHTML = '<div class="empty-state">🌾 କୋଉଠି ପୋଷ୍ଟ ନାହିଁ</div>';
            return;
        }
        
        container.innerHTML = recent.map(post => `
            <div class="post-card" style="margin-bottom:12px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.05);">
                <div class="post-header">
                    <div class="post-user">
                        <div class="post-avatar">${post.userName.charAt(0).toUpperCase()}</div>
                        <div>
                            <div class="post-name">${post.userName}</div>
                            <div class="post-time">${post.time}</div>
                        </div>
                    </div>
                </div>
                ${post.image ? `<img src="${post.image}" class="post-image" style="max-height:200px;">` : ''}
                <div class="post-caption" style="padding:12px 16px;">
                    <strong>${post.userName}</strong> ${post.text || ''}
                </div>
            </div>
        `).join('');
    }
    
    function likePost(id) {
        let post = posts.find(p => p.id === id);
        if (post.likes.includes(currentUser.id)) {
            post.likes = post.likes.filter(uid => uid !== currentUser.id);
        } else {
            post.likes.push(currentUser.id);
            if (!currentUser.likedPosts) currentUser.likedPosts = [];
            currentUser.likedPosts.push(id);
        }
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        savePosts();
    }
    
    function deletePost(id) {
        if (currentUser.role === 'admin' || posts.find(p => p.id === id)?.userId === currentUser.id) {
            posts = posts.filter(p => p.id !== id);
            savePosts();
            showToast('🗑️ ପୋଷ୍ଟ ଲିଭାଗଲା');
        }
    }
    
    function viewImage(src) {
        window.open(src, '_blank');
    }
    
    // ============ CHAT ============
    function sendChatMsg() {
        let input = document.getElementById('chatInput');
        let text = input.value.trim();
        if (!text) return;
        
        messages.push({
            id: Date.now(),
            user: currentUser.name || 'ଗ୍ରାମୀଣ',
            userId: currentUser.id,
            text: text,
            time: new Date().toLocaleTimeString()
        });
        localStorage.setItem('messages', JSON.stringify(messages));
        input.value = '';
        loadChat();
    }
    
    function loadChat() {
        let container = document.getElementById('chatMessages');
        if (messages.length === 0) {
            container.innerHTML = '<div class="empty-state">💬 ଚାଟ୍ ଆରମ୍ଭ କରନ୍ତୁ</div>';
            return;
        }
        container.innerHTML = messages.map(m => `
            <div class="msg ${m.userId === currentUser.id ? 'msg-right' : ''}">
                <div class="msg-user">${m.user}</div>
                <div class="msg-text">${m.text}</div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    // ============ SOS ============
    function sendSOS() {
        helpReqs.unshift({
            id: Date.now(),
            type: '🚨 SOS',
            user: currentUser.name || 'ଗ୍ରାମୀଣ',
            userId: currentUser.id,
            time: new Date().toLocaleString(),
            status: 'pending'
        });
        localStorage.setItem('helpReqs', JSON.stringify(helpReqs));
        showToast('🆘 SOS ପଠାଗଲା! ପ୍ରଶାସକଙ୍କୁ ସୂଚନା ଦିଆଗଲା');
        loadRequests();
    }
    
    function reportCorruption() {
        let desc = document.getElementById('corruptionText').value;
        if (!desc) { showToast('ବିବରଣୀ ଲେଖନ୍ତୁ'); return; }
        helpReqs.unshift({
            id: Date.now(),
            type: '⚠️ ଦୁର୍ନୀତି',
            description: desc,
            user: currentUser.name || 'ଗ୍ରାମୀଣ',
            userId: currentUser.id,
            time: new Date().toLocaleString(),
            status: 'pending'
        });
        localStorage.setItem('helpReqs', JSON.stringify(helpReqs));
        document.getElementById('corruptionText').value = '';
        showToast('📢 ରିପୋର୍ଟ ଦାଖଲ ହେଲା');
        loadRequests();
    }
    
    function requestHelp() {
        let desc = document.getElementById('helpText').value;
        if (!desc) { showToast('ସମସ୍ୟା ଲେଖନ୍ତୁ'); return; }
        helpReqs.unshift({
            id: Date.now(),
            type: '🛠️ ସମସ୍ୟା',
            description: desc,
            user: currentUser.name || 'ଗ୍ରାମୀଣ',
            userId: currentUser.id,
            time: new Date().toLocaleString(),
            status: 'pending'
        });
        localStorage.setItem('helpReqs', JSON.stringify(helpReqs));
        document.getElementById('helpText').value = '';
        showToast('🙏 ସହାୟତା ଅନୁରୋଧ ପଠାଗଲା');
        loadRequests();
    }
    
    function loadRequests() {
        let container = document.getElementById('requestsList');
        if (!container) return;
        let myReqs = helpReqs.filter(r => r.userId === currentUser.id || currentUser.role === 'admin');
        if (myReqs.length === 0) {
            container.innerHTML = '<div class="empty-state">📋 କୌଣସି ରିପୋର୍ଟ ନାହିଁ</div>';
            return;
        }
        container.innerHTML = myReqs.map(r => `
            <div class="help-card">
                <div><strong>${r.type}</strong> 🕐 ${r.time}</div>
                <div>👤 ${r.user}</div>
                ${r.description ? `<div>📝 ${r.description}</div>` : ''}
                <div style="color:${r.status === 'pending' ? 'orange' : 'green'};margin-top:8px;">${r.status === 'pending' ? '⏳ ଅପେକ୍ଷାରେ' : '✅ ସମାଧାନ ହେଲା'}</div>
                ${currentUser.role === 'admin' && r.status === 'pending' ? `<button onclick="resolveReq(${r.id})" style="margin-top:10px;">✅ ସମାଧାନ କରନ୍ତୁ</button>` : ''}
            </div>
        `).join('');
    }
    
    function resolveReq(id) {
        helpReqs = helpReqs.map(r => r.id === id ? {...r, status: 'resolved'} : r);
        localStorage.setItem('helpReqs', JSON.stringify(helpReqs));
        loadRequests();
        showToast('✅ ସମାଧାନ ହେଲା');
    }
    
    // ============ PROFILE ============
    function loadProfile() {
        document.getElementById('userName').value = currentUser.name || '';
        document.getElementById('userVillage').value = currentUser.village || '';
        document.getElementById('userRole').value = currentUser.role;
        document.getElementById('avatarEmoji').innerHTML = currentUser.avatar || '👤';
        document.getElementById('profileNameDisplay').innerHTML = currentUser.name || 'ଗ୍ରାମୀଣ';
        updateProfileStats();
    }
    
    function updateProfileStats() {
        let userPosts = posts.filter(p => p.userId === currentUser.id).length;
        let userLikes = currentUser.likedPosts?.length || 0;
        document.getElementById('userPostCount').innerHTML = userPosts;
        document.getElementById('userLikeCount').innerHTML = userLikes;
    }
    
    function saveUserProfile() {
        currentUser.name = document.getElementById('userName').value || 'ଗ୍ରାମୀଣ';
        currentUser.village = document.getElementById('userVillage').value;
        currentUser.role = document.getElementById('userRole').value;
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        loadProfile();
        loadPosts();
        showToast('💾 ପ୍ରୋଫାଇଲ୍ ସେଭ୍ ହେଲା');
    }
    
    document.getElementById('avatarFile')?.addEventListener('change', function(e) {
        let file = e.target.files[0];
        if (file) {
            let reader = new FileReader();
            reader.onload = function(ev) {
                currentUser.avatar = `<img src="${ev.target.result}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                loadProfile();
            };
            reader.readAsDataURL(file);
        }
    });
    
    function logout() {
        localStorage.removeItem('currentUser');
        location.reload();
    }
    
    // ============ ADD POST BUTTON ============
    function showAddPost() {
        let text = prompt("📝 ଆପଣଙ୍କର ପୋଷ୍ଟ ଲେଖନ୍ତୁ:");
        if (text) {
            let post = {
                id: Date.now(),
                text: text,
                userName: currentUser.name || 'ଗ୍ରାମୀଣ',
                userId: currentUser.id,
                time: new Date().toLocaleString(),
                likes: [],
                image: null
            };
            posts.unshift(post);
            savePosts();
            showToast('✅ ପୋଷ୍ଟ ହେଲା');
        }
    }
    
    // ============ ADD POST BOX TO HOME ============
    function addPostBoxToHome() {
        let homeScreen = document.getElementById('homeScreen');
        let postBox = document.createElement('div');
        postBox.className = 'post-box';
        postBox.style.margin = '16px';
        postBox.style.padding = '12px';
        postBox.style.background = 'white';
        postBox.style.borderRadius = '16px';
        postBox.style.boxShadow = '0 2px 8px rgba(0,0,0,0.05)';
        postBox.innerHTML = `
            <div class="post-input" style="display:flex;gap:10px;margin-bottom:10px;">
                <input type="text" id="homePostText" placeholder="କଣ ନୂଆ? (ପର୍ବ, ଖୁସି, ଖବର)..." style="flex:1;padding:12px;border:1px solid #ddd;border-radius:25px;">
            </div>
            <div class="post-buttons" style="display:flex;gap:10px;">
                <button class="photo-btn" onclick="document.getElementById('homePostFile').click()" style="flex:1;padding:10px;background:#6c757d;color:white;border:none;border-radius:25px;">📷 ଫଟୋ</button>
                <button class="post-submit" onclick="createPostFromHome()" style="flex:1;padding:10px;background:#1a8e3c;color:white;border:none;border-radius:25px;">📤 ପୋଷ୍ଟ</button>
            </div>
            <input type="file" id="homePostFile" accept="image/*" style="display:none">
        `;
        let welcomeCard = document.querySelector('.welcome-card');
        if (welcomeCard) {
            welcomeCard.insertAdjacentElement('afterend', postBox);
        }
        window.createPostFromHome = function() {
            let text = document.getElementById('homePostText').value;
            let file = document.getElementById('homePostFile').files[0];
            if (!text && !file) { showToast('କିଛି ଲେଖନ୍ତୁ କିମ୍ବା ଫଟୋ ଦିଅନ୍ତୁ'); return; }
            let post = {
                id: Date.now(),
                text: text,
                userName: currentUser.name || 'ଗ୍ରାମୀଣ',
                userId: currentUser.id,
                time: new Date().toLocaleString(),
                likes: [],
                image: null
            };
            if (file) {
                let reader = new FileReader();
                reader.onload = function(e) {
                    post.image = e.target.result;
                    posts.unshift(post);
                    savePosts();
                    showToast('✅ ପୋଷ୍ଟ ହେଲା');
                    document.getElementById('homePostText').value = '';
                    document.getElementById('homePostFile').value = '';
                };
                reader.readAsDataURL(file);
            } else {
                posts.unshift(post);
                savePosts();
                showToast('✅ ପୋଷ୍ଟ ହେଲା');
                document.getElementById('homePostText').value = '';
            }
        };
    }
    
    // ============ TOAST ============
    function showToast(msg) {
        let toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }
    
    // ============ INIT ============
    function init() {
        loadPosts();
        loadChat();
        addPostBoxToHome();
        updateProfileStats();
    }
    
    init();
</script>

</body>
</html>
