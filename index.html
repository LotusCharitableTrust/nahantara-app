<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#1a8e3c">
    <title>ନହନ୍ତରା - ମୋ ସ୍ବାଭିମାନ</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Oriya:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="logo">🌾</div>
            <div class="header-text">
                <h1>ମୋ ନହନ୍ତରା</h1>
                <p>ମୋ ସ୍ବାଭିମାନ</p>
            </div>
            <div class="notification-bell" onclick="showNotifications()">
                <span>🔔</span>
                <span id="notifBadge" class="notif-badge" style="display:none;">0</span>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Home Tab -->
            <div id="home" class="tab-page active">
                <div class="announcement-banner" id="announcementBanner">
                    <span>📢</span>
                    <span id="announcementText">ସ୍ଵାଗତମ୍!</span>
                    <button onclick="closeAnnouncement()">✕</button>
                </div>

                <div class="add-post-card">
                    <div class="add-post-header">
                        <img id="currentUserAvatar" class="small-avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%231a8e3c'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E">
                        <input type="text" id="postInput" placeholder="ଆଜି କଣ ନୂଆ? (ପର୍ବ, ଖୁସି, ଖବର)...">
                    </div>
                    <div class="add-post-actions">
                        <button class="media-btn" onclick="document.getElementById('postImage').click()">📷 ଫଟୋ/ଭିଡିଓ</button>
                        <input type="file" id="postImage" accept="image/*,video/*" style="display:none">
                        <button class="post-btn" onclick="createPost()">📤 ପୋଷ୍ଟ କରନ୍ତୁ</button>
                    </div>
                </div>

                <div id="postsFeed" class="posts-feed"></div>
            </div>

            <!-- Posts Tab (Gallery renamed) -->
            <div id="posts" class="tab-page">
                <div class="section-header">
                    <h3>📸 ସମସ୍ତ ପୋଷ୍ଟ</h3>
                    <p>ଗାଁର ସବୁ ଫଟୋ ଓ ଭିଡିଓ</p>
                </div>
                <div id="allPostsGrid" class="posts-grid"></div>
            </div>

            <!-- Chat Tab -->
            <div id="chat" class="tab-page">
                <div class="chat-header">
                    <h3>💬 ଗ୍ରୁପ୍ ଚାଟ୍</h3>
                    <select id="groupSelect" onchange="changeGroup()">
                        <option value="gaon">🏘️ ସମସ୍ତ ଗାଁ</option>
                        <option value="yuva">🚶 ଯୁବକ ମଣ୍ଡଳ</option>
                        <option value="mahila">👩 ମହିଳା ସମୂହ</option>
                    </select>
                </div>
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="ସନ୍ଦେଶ ଲେଖନ୍ତୁ...">
                    <button onclick="sendMessage()">➤</button>
                </div>
            </div>

            <!-- SOS Tab -->
            <div id="sos" class="tab-page">
                <div class="sos-container">
                    <div class="sos-button-main" onclick="sendSOS()">
                        <span>🆘</span>
                        <span>SOS - ଜରୁରୀ ସହାୟତା</span>
                    </div>
                    
                    <div class="help-section">
                        <h4>⚠️ ଦୁର୍ନୀତି ରିପୋର୍ଟ</h4>
                        <textarea id="corruptionDesc" placeholder="କେଉଁଠାରେ? କିଏ? ବିବରଣୀ..."></textarea>
                        <button onclick="reportCorruption()">📢 ରିପୋର୍ଟ କରନ୍ତୁ</button>
                    </div>

                    <div class="help-section">
                        <h4>🛠️ ସମସ୍ୟା / ବିପତ୍ତି</h4>
                        <textarea id="helpDesc" placeholder="ବିଜୁଳି, ପାଣି, ରାସ୍ତା, ବନ୍ୟା..."></textarea>
                        <button onclick="requestHelp()">🙏 ସହାୟତା ଆବଶ୍ୟକ</button>
                    </div>

                    <div id="helpRequestsList" class="help-requests-list"></div>
                </div>
            </div>

            <!-- Profile Tab -->
            <div id="profile" class="tab-page">
                <div class="profile-container">
                    <div class="profile-avatar-container" onclick="document.getElementById('profilePicInput').click()">
                        <img id="profileAvatar" class="profile-avatar-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%231a8e3c'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E">
                        <div class="camera-icon">📷</div>
                    </div>
                    <input type="file" id="profilePicInput" accept="image/*" style="display:none" onchange="updateProfilePicture(event)">
                    
                    <input type="text" id="profileName" placeholder="ଆପଣଙ୍କର ନାମ" class="profile-input">
                    <input type="text" id="profileVillage" placeholder="ମୋହଲ୍ଲା / ଗାଁ" class="profile-input">
                    <select id="profileRole" class="profile-input">
                        <option value="user">🌾 ସାଧାରଣ ସଦସ୍ୟ</option>
                        <option value="admin">👑 ପ୍ରଶାସକ</option>
                    </select>
                    <button class="profile-save-btn" onclick="saveProfile()">💾 ସେଭ୍ କରନ୍ତୁ</button>
                    
                    <div class="profile-stats">
                        <div class="stat">
                            <span id="postCount">0</span>
                            <span>ପୋଷ୍ଟ</span>
                        </div>
                        <div class="stat">
                            <span id="likesGivenCount">0</span>
                            <span>ଲାଇକ୍</span>
                        </div>
                    </div>
                    
                    <button class="logout-btn" onclick="logout()">🚪 ଲଗ୍ଆଉଟ୍</button>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <div class="nav-item active" data-tab="home">
                <span>🏠</span>
                <span>ହୋମ୍</span>
            </div>
            <div class="nav-item" data-tab="posts">
                <span>📸</span>
                <span>ପୋଷ୍ଟ</span>
            </div>
            <div class="nav-item" data-tab="chat">
                <span>💬</span>
                <span>ଚାଟ୍</span>
            </div>
            <div class="nav-item" data-tab="sos">
                <span>🆘</span>
                <span>SOS</span>
            </div>
            <div class="nav-item" data-tab="profile">
                <span>👤</span>
                <span>ପ୍ରୋଫାଇଲ୍</span>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="script.js"></script>
</body>
</html>
