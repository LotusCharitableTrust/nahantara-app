<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>Nahantara — Social Village</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Instagram-like mobile container */
        .app-container {
            max-width: 450px;
            width: 100%;
            background: #fff;
            height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* Sticky header */
        .sticky-header {
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 100;
            padding: 12px 16px;
            border-bottom: 0.5px solid #dbdbdb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .header-icons {
            display: flex;
            gap: 22px;
        }
        .header-icons span {
            font-size: 24px;
            cursor: pointer;
        }

        /* Main swipe container */
        .main-swipe {
            flex: 1;
            overflow-x: hidden;
            position: relative;
        }
        .swipe-track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.25s ease-out;
        }
        .page {
            width: 100%;
            flex-shrink: 0;
            overflow-y: auto;
            scrollbar-width: thin;
            padding-bottom: 70px;
        }
        .page::-webkit-scrollbar {
            display: none;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: sticky;
            bottom: 0;
            background: #fff;
            border-top: 0.5px solid #dbdbdb;
            display: flex;
            justify-content: space-around;
            padding: 10px 12px 14px;
            z-index: 99;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #8e8e8e;
            transition: all 0.1s;
            cursor: pointer;
        }
        .nav-item.active {
            color: #0095f6;
        }
        .nav-icon {
            font-size: 24px;
        }

        /* Stories row */
        .stories-row {
            padding: 12px 0 12px 12px;
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scrollbar-width: none;
            border-bottom: 0.5px solid #efefef;
        }
        .stories-row::-webkit-scrollbar { display: none; }
        .story-circle {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }
        .story-avatar {
            width: 68px;
            height: 68px;
            background: linear-gradient(45deg, #f09433, #d62976, #962fbf);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .story-avatar img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid white;
            object-fit: cover;
            background: #fff;
        }
        .story-avatar span {
            font-size: 32px;
        }

        /* Post card */
        .post-card {
            margin-bottom: 12px;
            background: #fff;
            border-bottom: 0.5px solid #efefef;
        }
        .post-header {
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .post-user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .post-avatar {
            width: 32px;
            height: 32px;
            background: #e4e6eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            text-transform: uppercase;
        }
        .post-name {
            font-weight: 600;
            font-size: 13px;
        }
        .post-time {
            font-size: 10px;
            color: #8e8e8e;
        }
        .post-image {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
            background: #fafafa;
        }
        .post-actions {
            padding: 8px 12px;
            display: flex;
            gap: 18px;
        }
        .action-btn {
            font-size: 26px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .action-btn:active { transform: scale(0.9); }
        .liked { color: #ed4956; }
        .post-likes { padding: 0 12px 6px; font-weight: 600; font-size: 13px; }
        .post-caption { padding: 0 12px 8px; font-size: 14px; }
        .comments-section { padding: 8px 12px 12px; background: #fafafa; border-top: 0.5px solid #efefef; }

        /* Grid (Explore) */
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background: #fff;
        }
        .grid-item {
            aspect-ratio: 1 / 1;
            background: #efefef;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
        }
        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .full-view-modal {
            position: fixed;
            top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .full-view-modal img { max-width: 90%; max-height: 80%; }

        /* Profile */
        .profile-header {
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 24px;
            border-bottom: 0.5px solid #efefef;
        }
        .profile-avatar-lg {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            overflow: hidden;
        }
        .profile-stats {
            display: flex;
            gap: 24px;
            text-align: center;
        }
        .stat-num { font-weight: 700; font-size: 18px; }
        .edit-btn {
            margin: 12px 16px;
            background: #efefef;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
        }
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            margin-top: 4px;
        }

        /* Chat UI */
        .chat-messages {
            flex:1;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            height: calc(100vh - 180px);
        }
        .message-bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 22px;
            font-size: 14px;
        }
        .message-left { background: #efefef; align-self: flex-start; }
        .message-right { background: #0095f6; color: white; align-self: flex-end; }
        .chat-input-area {
            display: flex;
            padding: 12px;
            gap: 8px;
            border-top: 0.5px solid #dbdbdb;
            background: white;
        }
        .chat-input-area input { flex:1; padding: 10px; border-radius: 25px; border: 0.5px solid #dbdbdb; }

        /* SOS */
        .sos-btn {
            background: #ed4956;
            color: white;
            text-align: center;
            padding: 16px;
            margin: 16px;
            border-radius: 14px;
            font-weight: bold;
        }
        .help-card {
            background: #fafafa;
            margin: 12px;
            padding: 12px;
            border-radius: 12px;
        }
        button, .action-click {
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 1100;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="sticky-header">
        <div class="logo">📸 Nahantara</div>
        <div class="header-icons">
            <span>❤️</span>
            <span>💬</span>
        </div>
    </div>

    <div class="main-swipe" id="swipeContainer">
        <div class="swipe-track" id="swipeTrack">
            <!-- HOME PAGE -->
            <div class="page" id="homePage">
                <div class="stories-row" id="storiesContainer"></div>
                <div id="homeFeed"></div>
            </div>
            <!-- EXPLORE / REELS PAGE (Grid) -->
            <div class="page" id="explorePage">
                <div class="grid-3" id="exploreGrid"></div>
            </div>
            <!-- CHAT PAGE (Group + DM) -->
            <div class="page" id="chatPage">
                <div style="padding:12px; display:flex; gap:12px; border-bottom:0.5px solid #dbdbdb;">
                    <button id="dmTabBtn" style="flex:1; background:none; border:none; font-weight:600;">💬 DM</button>
                    <button id="groupTabBtn" style="flex:1; background:none; border:none; font-weight:600;">👥 Group</button>
                </div>
                <div id="dmChatView">
                    <div class="chat-messages" id="dmMessages"></div>
                    <div class="chat-input-area"><input type="text" id="dmInput" placeholder="Message..."><button onclick="sendDMMessage()">➤</button></div>
                </div>
                <div id="groupChatView" style="display:none;">
                    <div class="chat-messages" id="groupMessages"></div>
                    <div class="chat-input-area"><input type="text" id="groupInput" placeholder="Group message..."><button onclick="sendGroupMessage()">➤</button></div>
                </div>
            </div>
            <!-- PROFILE PAGE -->
            <div class="page" id="profilePage">
                <div id="profileContainer"></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" data-index="0"><div class="nav-icon">🏠</div><div>Home</div></div>
        <div class="nav-item" data-index="1"><div class="nav-icon">🔍</div><div>Explore</div></div>
        <div class="nav-item" data-index="2"><div class="nav-icon">💬</div><div>Chat</div></div>
        <div class="nav-item" data-index="3"><div class="nav-icon">👤</div><div>Profile</div></div>
    </div>
</div>
<div id="toastMsg" class="toast" style="display:none;"></div>

<script>
    // ---------- DATA MODELS ----------
    let currentUser = JSON.parse(localStorage.getItem('nahantara_user')) || { id: 'user1', username: 'NahantaraUser', avatar: null, bio: 'Village heart 🌾', followers: 124, following: 86 };
    let allPosts = JSON.parse(localStorage.getItem('nahantara_posts')) || [];
    let stories = [{ id: 1, username: 'gram_dev', img: null }, { id: 2, username: 'nayak_parbati', img: null }, { id: 3, username: 'sahu_village', img: null }, { id: 4, username: 'nahantara_team', img: null }];
    let dmMessages = JSON.parse(localStorage.getItem('nahantara_dm')) || [];
    let groupMessages = JSON.parse(localStorage.getItem('nahantara_group')) || [];
    let notifications = JSON.parse(localStorage.getItem('nahantara_notifications')) || [];

    function saveAll() {
        localStorage.setItem('nahantara_user', JSON.stringify(currentUser));
        localStorage.setItem('nahantara_posts', JSON.stringify(allPosts));
        localStorage.setItem('nahantara_dm', JSON.stringify(dmMessages));
        localStorage.setItem('nahantara_group', JSON.stringify(groupMessages));
        localStorage.setItem('nahantara_notifications', JSON.stringify(notifications));
    }

    // Helper
    function showToast(msg) {
        let toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }

    // ------ AUTH (simple) ------
    function initAuth() {
        if (!localStorage.getItem('nahantara_user')) {
            let name = prompt('Welcome! Enter your username:', 'Villager');
            if(name) currentUser.username = name;
            saveAll();
        }
        renderAll();
    }

    // ------ POST creation ------
    function createPost(text, imageData) {
        if(!text && !imageData) return showToast('Write something or add image');
        let newPost = {
            id: Date.now(),
            userId: currentUser.id,
            username: currentUser.username,
            userAvatar: currentUser.avatar,
            text: text,
            image: imageData || null,
            likes: [],
            comments: [],
            timestamp: Date.now(),
            timeAgo: new Date().toLocaleString()
        };
        allPosts.unshift(newPost);
        saveAll();
        addNotification(`${currentUser.username} created a new post.`);
        renderHomeFeed();
        renderProfile();
        renderExplore();
    }

    function toggleLike(postId) {
        let post = allPosts.find(p => p.id == postId);
        if(post) {
            if(post.likes.includes(currentUser.id)) {
                post.likes = post.likes.filter(id => id !== currentUser.id);
            } else {
                post.likes.push(currentUser.id);
                addNotification(`${currentUser.username} liked your post.`);
            }
            saveAll();
            renderHomeFeed();
            renderProfile();
        }
    }

    function addComment(postId, text) {
        if(!text.trim()) return;
        let post = allPosts.find(p => p.id == postId);
        if(post) {
            post.comments.push({ userId: currentUser.id, username: currentUser.username, text: text, time: Date.now() });
            saveAll();
            addNotification(`${currentUser.username} commented: "${text.slice(0,20)}"`);
            renderHomeFeed();
        }
    }

    function addNotification(msg) {
        notifications.unshift({ msg, time: Date.now() });
        if(notifications.length > 20) notifications.pop();
        saveAll();
    }

    // ------ Stories UI ------
    function renderStories() {
        let container = document.getElementById('storiesContainer');
        if(!container) return;
        container.innerHTML = stories.map(s => `
            <div class="story-circle">
                <div class="story-avatar"><span>📷</span></div>
                <span>${s.username.slice(0,10)}</span>
            </div>
        `).join('');
    }

    // ------ Home Feed ------
    function renderHomeFeed() {
        let feedDiv = document.getElementById('homeFeed');
        if(!feedDiv) return;
        if(allPosts.length === 0) { feedDiv.innerHTML = '<div style="padding:40px;text-align:center">🌾 No posts yet, create one!</div>'; return; }
        feedDiv.innerHTML = allPosts.map(post => `
            <div class="post-card">
                <div class="post-header">
                    <div class="post-user-info">
                        <div class="post-avatar">${post.username.charAt(0).toUpperCase()}</div>
                        <div><div class="post-name">${escapeHtml(post.username)}</div><div class="post-time">${post.timeAgo}</div></div>
                    </div>
                    <div>⋯</div>
                </div>
                ${post.image ? `<img src="${post.image}" class="post-image" onclick="openFullImage('${post.image}')">` : ''}
                <div class="post-actions">
                    <div class="action-btn ${post.likes.includes(currentUser.id) ? 'liked' : ''}" onclick="toggleLike(${post.id})">❤️</div>
                    <div class="action-btn" onclick="toggleCommentBox(${post.id})">💬</div>
                </div>
                <div class="post-likes">${post.likes.length} likes</div>
                <div class="post-caption"><strong>${escapeHtml(post.username)}</strong> ${escapeHtml(post.text || '')}</div>
                <div id="commentBox-${post.id}" style="display:none; padding:8px 12px;">
                    <div>${post.comments.map(c => `<div><strong>${escapeHtml(c.username)}</strong> ${escapeHtml(c.text)}</div>`).join('')}</div>
                    <div style="display:flex; gap:8px; margin-top:8px;"><input id="commentInput-${post.id}" placeholder="Add comment..." style="flex:1; padding:8px; border-radius:20px; border:0.5px solid #ccc;"><button onclick="submitComment(${post.id})">Post</button></div>
                </div>
            </div>
        `).join('');
    }

    window.toggleCommentBox = (postId) => {
        let box = document.getElementById(`commentBox-${postId}`);
        if(box) box.style.display = box.style.display === 'none' ? 'block' : 'none';
    };
    window.submitComment = (postId) => {
        let input = document.getElementById(`commentInput-${postId}`);
        if(input) { addComment(postId, input.value); input.value = ''; renderHomeFeed(); }
    };
    window.openFullImage = (src) => {
        let modal = document.createElement('div'); modal.className = 'full-view-modal'; modal.innerHTML = `<img src="${src}"><div style="position:absolute;top:20px;right:30px;color:white;font-size:30px;cursor:pointer" onclick="this.parentElement.remove()">✕</div>`;
        document.body.appendChild(modal);
    };

    // ------ Explore Grid (Reels style) ------
    function renderExplore() {
        let gridDiv = document.getElementById('exploreGrid');
        if(!gridDiv) return;
        let imagesOnly = allPosts.filter(p => p.image);
        if(imagesOnly.length === 0) { gridDiv.innerHTML = '<div style="grid-column:span 3; text-align:center; padding:40px;">No media yet</div>'; return; }
        gridDiv.innerHTML = imagesOnly.map(post => `<div class="grid-item" onclick="openFullImage('${post.image}')"><img src="${post.image}"></div>`).join('');
    }

    // ------ Profile Page (Instagram style)-----
    function renderProfile() {
        let container = document.getElementById('profileContainer');
        let userPosts = allPosts.filter(p => p.userId === currentUser.id);
        container.innerHTML = `
            <div class="profile-header">
                <div class="profile-avatar-lg"><span>${currentUser.avatar ? `<img src="${currentUser.avatar}" style="width:100%;height:100%;object-fit:cover">` : currentUser.username.charAt(0).toUpperCase()}</span></div>
                <div class="profile-stats">
                    <div><div class="stat-num">${userPosts.length}</div><div>posts</div></div>
                    <div><div class="stat-num">${currentUser.followers}</div><div>followers</div></div>
                    <div><div class="stat-num">${currentUser.following}</div><div>following</div></div>
                </div>
            </div>
            <div class="edit-btn" onclick="editProfile()">Edit Profile</div>
            <div style="padding:0 16px 8px;"><strong>${escapeHtml(currentUser.username)}</strong><br>${escapeHtml(currentUser.bio)}</div>
            <div class="profile-grid" id="userPostGrid"></div>
        `;
        let gridSmall = document.getElementById('userPostGrid');
        if(gridSmall) {
            let userImages = userPosts.filter(p => p.image);
            gridSmall.innerHTML = userImages.map(p => `<div class="grid-item" onclick="openFullImage('${p.image}')"><img src="${p.image}"></div>`).join('');
            if(userImages.length === 0) gridSmall.innerHTML = '<div style="grid-column:span 3; text-align:center; padding:20px;">No posts</div>';
        }
    }

    window.editProfile = () => {
        let newName = prompt('New username:', currentUser.username);
        let newBio = prompt('Bio:', currentUser.bio);
        if(newName) currentUser.username = newName;
        if(newBio) currentUser.bio = newBio;
        saveAll();
        renderProfile();
        renderHomeFeed();
        showToast('Profile updated');
    };

    // ----- CHAT SYSTEM (DM + Group) -----
    function renderDM() {
        let dmDiv = document.getElementById('dmMessages');
        if(!dmDiv) return;
        dmDiv.innerHTML = dmMessages.map(m => `<div class="message-bubble ${m.senderId === currentUser.id ? 'message-right' : 'message-left'}">${escapeHtml(m.text)}<div style="font-size:10px; opacity:0.7">${m.time || ''}</div></div>`).join('');
        dmDiv.scrollTop = dmDiv.scrollHeight;
    }
    function renderGroup() {
        let groupDiv = document.getElementById('groupMessages');
        if(!groupDiv) return;
        groupDiv.innerHTML = groupMessages.map(m => `<div class="message-bubble ${m.senderId === currentUser.id ? 'message-right' : 'message-left'}"><strong>${escapeHtml(m.senderName)}</strong> ${escapeHtml(m.text)}<div style="font-size:9px;">${m.time}</div></div>`).join('');
        groupDiv.scrollTop = groupDiv.scrollHeight;
    }
    window.sendDMMessage = () => {
        let input = document.getElementById('dmInput');
        if(input.value.trim()) {
            dmMessages.push({ senderId: currentUser.id, senderName: currentUser.username, text: input.value, time: new Date().toLocaleTimeString() });
            saveAll();
            renderDM();
            input.value = '';
        }
    };
    window.sendGroupMessage = () => {
        let input = document.getElementById('groupInput');
        if(input.value.trim()) {
            groupMessages.push({ senderId: currentUser.id, senderName: currentUser.username, text: input.value, time: new Date().toLocaleTimeString() });
            saveAll();
            renderGroup();
            input.value = '';
        }
    };

    // tab switching chat
    function initChatTabs() {
        let dmBtn = document.getElementById('dmTabBtn');
        let groupBtn = document.getElementById('groupTabBtn');
        if(dmBtn && groupBtn) {
            dmBtn.onclick = () => { document.getElementById('dmChatView').style.display = 'block'; document.getElementById('groupChatView').style.display = 'none'; renderDM(); };
            groupBtn.onclick = () => { document.getElementById('dmChatView').style.display = 'none'; document.getElementById('groupChatView').style.display = 'block'; renderGroup(); };
        }
    }

    // ------ SOS / Emergency helper ----
    function createSOSSection() {
        // optional but we inject emergency button on profile bottom?
        let profileContainer = document.getElementById('profileContainer');
        if(profileContainer && !document.getElementById('sosExtra')) {
            let sosDiv = document.createElement('div');
            sosDiv.id = 'sosExtra';
            sosDiv.innerHTML = `<div class="sos-btn" onclick="triggerSOS()">🆘 EMERGENCY SOS</div><div class="help-card"><textarea id="reportText" rows="2" placeholder="Report corruption / issue..."></textarea><button onclick="reportIssue()" style="margin-top:8px; background:#0095f6; border:none; padding:8px; border-radius:12px; width:100%;">📢 Submit Report</button></div>`;
            profileContainer.appendChild(sosDiv);
        }
    }
    window.triggerSOS = () => { alert('🚨 SOS Alert! Village admin notified. Stay safe.'); addNotification('SOS triggered by ' + currentUser.username); };
    window.reportIssue = () => {
        let txt = document.getElementById('reportText')?.value;
        if(txt) { alert('Report sent to village council.'); addNotification(`New report: ${txt.slice(0,40)}`); document.getElementById('reportText').value = ''; }
        else showToast('Write report');
    };

    // ------ Swipe + Bottom Navigation (instagram style) ------
    let currentIndex = 0;
    const trackDiv = document.getElementById('swipeTrack');
    const pages = document.querySelectorAll('.page');
    const navItems = document.querySelectorAll('.nav-item');

    function updateSwipe() {
        if(trackDiv) trackDiv.style.transform = `translateX(-${currentIndex * 100}%)`;
        navItems.forEach((item, i) => {
            if(i === currentIndex) item.classList.add('active');
            else item.classList.remove('active');
        });
        if(currentIndex === 0) { renderHomeFeed(); renderStories(); }
        if(currentIndex === 1) renderExplore();
        if(currentIndex === 2) { renderDM(); renderGroup(); initChatTabs(); if(document.getElementById('dmChatView').style.display !== 'none') renderDM(); else renderGroup(); }
        if(currentIndex === 3) { renderProfile(); createSOSSection(); }
    }

    navItems.forEach((item, idx) => { item.addEventListener('click', () => { currentIndex = idx; updateSwipe(); }); });
    let startX = 0;
    document.getElementById('swipeContainer')?.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; });
    document.getElementById('swipeContainer')?.addEventListener('touchend', (e) => {
        let endX = e.changedTouches[0].clientX;
        let diff = endX - startX;
        if(Math.abs(diff) > 40) {
            if(diff > 0 && currentIndex > 0) currentIndex--;
            else if(diff < 0 && currentIndex < pages.length-1) currentIndex++;
            updateSwipe();
        }
    });

    // create floating post button + plus create modal (instagram-like)
    function addFloatingCreate() {
        let fab = document.createElement('div');
        fab.innerHTML = '✚';
        fab.style.position = 'fixed';
        fab.style.bottom = '80px';
        fab.style.right = '20px';
        fab.style.background = '#0095f6';
        fab.style.color = 'white';
        fab.style.width = '50px';
        fab.style.height = '50px';
        fab.style.borderRadius = '50%';
        fab.style.display = 'flex';
        fab.style.alignItems = 'center';
        fab.style.justifyContent = 'center';
        fab.style.fontSize = '28px';
        fab.style.fontWeight = 'bold';
        fab.style.boxShadow = '0 4px 10px rgba(0,0,0,0.2)';
        fab.style.cursor = 'pointer';
        fab.style.zIndex = '200';
        fab.onclick = () => {
            let text = prompt('Write caption:');
            let fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*';
            fileInput.onchange = (e) => {
                let file = e.target.files[0];
                if(file) {
                    let reader = new FileReader();
                    reader.onload = (ev) => { createPost(text || '', ev.target.result); };
                    reader.readAsDataURL(file);
                } else createPost(text || '', null);
            };
            fileInput.click();
        };
        document.querySelector('.app-container').appendChild(fab);
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function renderAll() {
        renderHomeFeed();
        renderStories();
        renderExplore();
        renderProfile();
        renderDM();
        renderGroup();
        createSOSSection();
    }

    initAuth();
    addFloatingCreate();
    updateSwipe();
</script>
</body>
</html>
