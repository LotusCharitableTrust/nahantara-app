<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ନହନ୍ତରା - ମୋ ସ୍ବାଭିମାନ</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <span>🌾</span> ମୋ ନହନ୍ତରା
        </div>
        <div class="header-action">❤️</div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="content">

        <!-- ================= HOME ================= -->
        <section id="homeScreen" class="screen active">

            <!-- Welcome -->
            <div class="welcome-box">
                <h3>👋 ନମସ୍କାର, <span id="welcomeName">ସଦସ୍ୟ</span></h3>
                <p>ଆଜି ଗାଁରେ କଣ ନୂଆ?</p>
            </div>

            <!-- Post Box -->
            <div class="post-box">
                <input type="text" id="postText" class="post-input" placeholder="କଣ ନୂଆ? (ପର୍ବ, ଖୁସି, ଖବର)...">
                
                <div class="post-buttons">
                    <button class="photo-btn" onclick="document.getElementById('postFile').click()">📷 ଫଟୋ</button>
                    <button class="submit-btn" onclick="submitPost()">📤 ପୋଷ୍ଟ</button>
                </div>

                <input type="file" id="postFile" accept="image/*" hidden>
            </div>

            <!-- Feed -->
            <div id="postsFeed" class="feed"></div>

        </section>


        <!-- ================= POSTS GRID ================= -->
        <section id="postsScreen" class="screen">
            <div class="section-title">📸 ସମସ୍ତ ଫଟୋ</div>
            <div id="allPostsGrid" class="posts-grid"></div>
        </section>


        <!-- ================= CHAT ================= -->
        <section id="chatScreen" class="screen">
            <div class="chat-area">

                <div class="chat-header">
                    💬 ଗାଁ ଚାଟ୍
                </div>

                <div id="chatMessages" class="chat-messages"></div>

                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="ସନ୍ଦେଶ ଲେଖନ୍ତୁ...">
                    <button onclick="sendMessage()">➤</button>
                </div>

            </div>
        </section>


        <!-- ================= SOS ================= -->
        <section id="sosScreen" class="screen">

            <div class="section-title">🚨 ଜରୁରୀ ସହାୟତା</div>

            <div class="sos-btn" onclick="sendSOS()">
                🆘 SOS - ତୁରନ୍ତ ସହାୟତା
            </div>

            <div class="help-card">
                <h4>⚠️ ଦୁର୍ନୀତି ରିପୋର୍ଟ</h4>
                <textarea id="corruptionText" rows="2" placeholder="ବିବରଣୀ ଲେଖନ୍ତୁ..."></textarea>
                <button onclick="reportCorruption()">📢 ରିପୋର୍ଟ କରନ୍ତୁ</button>
            </div>

            <div class="help-card">
                <h4>🛠️ ସମସ୍ୟା / ଅନୁରୋଧ</h4>
                <textarea id="helpText" rows="2" placeholder="ଆପଣଙ୍କ ସମସ୍ୟା..."></textarea>
                <button onclick="requestHelp()">🙏 ସହାୟତା ଚାହିଁ</button>
            </div>

            <div id="requestsList"></div>

        </section>


        <!-- ================= PROFILE ================= -->
        <section id="profileScreen" class="screen">

            <div class="profile-header">

                <div class="profile-avatar" onclick="document.getElementById('avatarFile').click()">
                    <span id="avatarDisplay">👤</span>
                </div>

                <div id="profileNameDisplay" class="profile-name">ଗ୍ରାମୀଣ</div>

                <div class="profile-stats">
                    <div>
                        <div id="postCount">0</div>
                        <small>ପୋଷ୍ଟ</small>
                    </div>
                    <div>
                        <div id="likeCount">0</div>
                        <small>ଲାଇକ୍</small>
                    </div>
                </div>

                <input type="file" id="avatarFile" accept="image/*" hidden>

            </div>

            <div class="profile-card">
                <input type="text" id="userName" placeholder="ନାମ">
                <input type="text" id="userVillage" placeholder="ଗାଁ / ମୋହଲ୍ଲା">

                <select id="userRole">
                    <option value="user">🌾 ସାଧାରଣ ସଦସ୍ୟ</option>
                    <option value="admin">👑 ପ୍ରଶାସକ</option>
                </select>

                <button class="edit-btn" onclick="saveProfile()">💾 ସେଭ୍ କରନ୍ତୁ</button>
                <button class="logout-btn" onclick="logout()">🚪 ଲଗ୍ଆଉଟ୍</button>
            </div>

        </section>

    </main>


    <!-- ================= BOTTOM NAV ================= -->
    <nav class="bottom-nav">

        <div class="nav-item active" onclick="changeScreen('home')">
            <div class="nav-icon">🏠</div>
            <div class="nav-label">ହୋମ୍</div>
        </div>

        <div class="nav-item" onclick="changeScreen('posts')">
            <div class="nav-icon">📸</div>
            <div class="nav-label">ପୋଷ୍ଟ</div>
        </div>

        <div class="nav-item" onclick="changeScreen('chat')">
            <div class="nav-icon">💬</div>
            <div class="nav-label">ଚାଟ୍</div>
        </div>

        <div class="nav-item" onclick="changeScreen('sos')">
            <div class="nav-icon">🆘</div>
            <div class="nav-label">SOS</div>
        </div>

        <div class="nav-item" onclick="changeScreen('profile')">
            <div class="nav-icon">👤</div>
            <div class="nav-label">ମୋର</div>
        </div>

    </nav>

</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script src="script.js"></script>

</body>
</html>
